<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- file style css -->
    <link rel="stylesheet" href="css/style.css">

    <!-- fonts form google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Jomhuria&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap" rel="stylesheet">
    <title>Coffe || register</title>
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">Restorant</a>
            <nav>
                <ul class="links">
                    <li><a href="login.html">Login</a></li>
                    <li><a href="#">Register</a></li>
                </ul>
                <ul class="user">
                    <li><a href="#" class="user-info"></a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="section-form">
        <div class="content">
            <h2>Register User</h2>
            <form>
                <input type="text" id="user-name" placeholder="Enter Your User Name">
                <input type="email" id="email" placeholder="Enter Your Email">
                <input type="text" id="phone" placeholder="Enter Your Phone Number">
                <input type="password" id="password" placeholder="Enter Your Password">
                <input type="button" value="Sign Up" id="register-btn">
                <p>Have An Account <a href="login.html">LogIn</a></p>
            </form>
        </div>
    </section>

    <script src="./js/register.js"></script>
</body>
</html>
